app.name=FlowForge
server.port=8080
server.name=FlowForgeServer
app.env=dev

# --- Database (uncomment one block to enable) ---

# H2 in-memory (no external DB required):
# datasource.url=jdbc:h2:mem:flowforge;MODE=MySQL;DB_CLOSE_DELAY=-1
# datasource.username=sa
# datasource.password=

# MySQL:
# datasource.url=jdbc:mysql://localhost:3306/mydb
# datasource.username=root
# datasource.password=secret

# ddl-auto: create (auto-create tables) | none (skip schema generation)
# datasource.ddl-auto=create
# datasource.pool-size=10